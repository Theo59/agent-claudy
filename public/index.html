    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Claudy mark (Ray-Ban aviators + moustache), defined ONCE and reused
         everywhere via <use href="#claudy-mark"> → a single place to edit. -->
    <svg width="0" height="0" style="position: absolute" aria-hidden="true">
      <symbol id="claudy-mark" viewBox="0 0 64 42" fill="currentColor">
        <path d="M6 11 Q32 7 58 11 L58 13.5 Q32 9.5 6 13.5 Z" />
        <rect x="28" y="13" width="8" height="2" rx="1" />
        <rect x="28" y="16.5" width="8" height="1.8" rx="0.9" />
        <path fill-rule="evenodd" d="M6 12 C6 12 22 11 27 13 C29 14 29 18.5 26.5 23.5 C23 30 15 31.5 10.5 28 C6.5 24.5 5 18 6 12 Z M9 14 C8.5 19 10 24.5 13 26.5 C17 28.5 22.5 26.5 24.5 21.5 C26 17.5 26.5 14.6 25 13.6 C21 11.8 11 12.5 9 14 Z" />
        <path fill-rule="evenodd" d="M58 12 C58 12 42 11 37 13 C35 14 35 18.5 37.5 23.5 C41 30 49 31.5 53.5 28 C57.5 24.5 59 18 58 12 Z M55 14 C55.5 19 54 24.5 51 26.5 C47 28.5 41.5 26.5 39.5 21.5 C38 17.5 37.5 14.6 39 13.6 C43 11.8 53 12.5 55 14 Z" />
        <path d="M32 33 C27 32.4 22.5 32.6 21 35.2 C20 37 20.4 39.6 21.8 39.8 C23 40 23.2 37.6 24.6 35.8 C26.6 33.6 29.6 33.6 32 33.8 C34.4 33.6 37.4 33.6 39.4 35.8 C40.8 37.6 41 40 42.2 39.8 C43.6 39.6 44 37 43 35.2 C41.5 32.6 37 32.4 32 33 Z" />
      </symbol>
    </svg>

    <header class="topbar">
      <div class="brand">
        <svg class="brand-mark" aria-hidden="true"><use href="#claudy-mark" /></svg>
        <h1>agent-claudy</h1>
      </div>

      <div class="status">
        <span id="conn" class="dot dot--off" title="Connexion au serveur"></span>
        <span id="conn-label">connexion…</span>
        <span class="sep">·</span>
        <span id="count">0 agent</span>
        <span id="summary" class="summary"></span>
      </div>

      <div class="controls">
        <button id="refresh" class="icon-btn" type="button" title="Rafraîchir" aria-label="Rafraîchir">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12a9 9 0 1 1-2.64-6.36" />
            <path d="M21 3v6h-6" />
          </svg>
        </button>
        <button id="settings-open" class="icon-btn" type="button" title="Réglages" aria-label="Réglages">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </button>
      </div>
    </header>

    <main id="grid" class="grid">
      <!-- Agent cards are injected here by app.js -->
    </main>

    <!-- Dedicated announcement region: we push ONLY requests (needs_input) here,
         not the scrolling quotes, so screen readers don't get overwhelmed. -->
    <div id="sr-live" class="sr-only" role="status" aria-live="polite"></div>

    <div id="empty" class="empty">
      <svg class="empty-mark" aria-hidden="true"><use href="#claudy-mark" /></svg>
      <p>Aucun agent pour l'instant.</p>
      <p class="muted">
        Lance la <strong>démo</strong> depuis <strong>⚙ Réglages</strong>, ou fais remonter tes
        agents avec <code>node bin/claudy-report.js &lt;id&gt; working</code>.
      </p>
    </div>

    <footer class="footer">
      <svg class="footer-mark" aria-hidden="true"><use href="#claudy-mark" /></svg>
      <span>« Éducation minimum ! » — Claudy Focan</span>
    </footer>

    <script src="claudy.js"></script>
    <script src="app.js"></script>
    <script src="settings.js"></script>
  </body>
</html>
